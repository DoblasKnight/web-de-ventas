<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechStore — Electrónica Premium</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #060910;
        --surface: #0d1117;
        --surface2: #131a24;
        --border: rgba(255, 255, 255, 0.07);
        --accent: #00f5a0;
        --accent2: #00d9f5;
        --accent3: #f5a000;
        --text: #e8edf5;
        --muted: #6b7a90;
        --danger: #ff4757;
        --cart-w: 320px;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Background FX ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% -10%,
            rgba(0, 245, 160, 0.07) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 50% at 80% 110%,
            rgba(0, 217, 245, 0.06) 0%,
            transparent 60%
          );
        pointer-events: none;
        z-index: 0;
      }

      /* ── Grid texture ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px
          );
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 64px;
        background: rgba(6, 9, 16, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo span {
        color: var(--accent);
      }

      .logo-dot {
        width: 7px;
        height: 7px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .btn-login {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 20px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-login:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 245, 160, 0.07);
      }

      .btn-cart {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 8px 20px;
        border-radius: 10px;
        border: none;
        background: var(--accent);
        color: #060910;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-cart:hover {
        background: #00d484;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(0, 245, 160, 0.3);
      }

      .cart-badge {
        background: #060910;
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Layout ── */
      .main {
        position: relative;
        z-index: 1;
        display: flex;
        min-height: calc(100vh - 64px);
      }

      .content {
        flex: 1;
        padding: 40px;
        transition: margin-right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Hero ── */
      .hero {
        margin-bottom: 48px;
      }

      .hero-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hero-label::before {
        content: "";
        display: block;
        width: 20px;
        height: 1px;
        background: var(--accent);
      }

      .hero h2 {
        font-family: "Syne", sans-serif;
        font-size: clamp(36px, 5vw, 58px);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -1.5px;
        margin-bottom: 16px;
      }

      .hero h2 em {
        font-style: normal;
        color: transparent;
        -webkit-text-stroke: 1px var(--accent);
      }

      .hero p {
        color: var(--muted);
        font-size: 15px;
        max-width: 480px;
        line-height: 1.7;
      }

      /* ── Filters ── */
      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }

      .filter-btn {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 500;
        padding: 9px 20px;
        border-radius: 100px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn:hover {
        border-color: rgba(0, 245, 160, 0.4);
        color: var(--text);
        background: rgba(0, 245, 160, 0.05);
      }

      .filter-btn.active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(0, 245, 160, 0.1);
      }

      /* ── Products Grid ── */
      .products {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 20px;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.3s,
          box-shadow 0.3s;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card:hover {
        transform: translateY(-6px);
        border-color: rgba(0, 245, 160, 0.25);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(0, 245, 160, 0.1);
      }

      .card-img {
        position: relative;
        width: 100%;
        height: 180px;
        overflow: hidden;
        background: var(--surface2);
      }

      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }

      .card:hover .card-img img {
        transform: scale(1.08);
      }

      .card-cat {
        position: absolute;
        top: 12px;
        left: 12px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 100px;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        color: var(--accent);
      }

      .card-body {
        padding: 18px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card-name {
        font-family: "Syne", sans-serif;
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
        letter-spacing: -0.3px;
      }

      .card-price {
        font-size: 22px;
        font-weight: 700;
        font-family: "Syne", sans-serif;
        color: var(--accent);
        letter-spacing: -0.5px;
        margin-top: 8px;
        margin-bottom: 16px;
      }

      .card-price span {
        font-size: 13px;
        font-weight: 400;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
      }

      .btn-add {
        font-family: "DM Sans", sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 11px;
        border-radius: 12px;
        border: none;
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: auto;
      }

      .btn-add:hover {
        background: var(--accent);
        color: #060910;
        box-shadow: 0 4px 20px rgba(0, 245, 160, 0.3);
      }

      .btn-add svg {
        flex-shrink: 0;
      }

      /* ── Cart Drawer ── */
      .cart-drawer {
        position: fixed;
        top: 64px;
        right: 0;
        width: var(--cart-w);
        height: calc(100vh - 64px);
        background: var(--surface);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 90;
      }

      .cart-drawer.open {
        transform: translateX(0);
      }

      .cart-header {
        padding: 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .cart-title {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 700;
      }

      .btn-close-cart {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .btn-close-cart:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .cart-items::-webkit-scrollbar {
        width: 4px;
      }
      .cart-items::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .cart-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        animation: slideIn 0.3s ease both;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .cart-item-img {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        object-fit: cover;
        background: var(--bg);
        flex-shrink: 0;
      }

      .cart-item-info {
        flex: 1;
        min-width: 0;
      }

      .cart-item-name {
        font-size: 13px;
        font-weight: 600;
        font-family: "Syne", sans-serif;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .cart-item-price {
        font-size: 12px;
        color: var(--accent);
        margin-top: 2px;
      }

      .btn-remove {
        width: 26px;
        height: 26px;
        border-radius: 7px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }

      .btn-remove:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: rgba(255, 71, 87, 0.08);
      }

      .cart-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }

      .cart-empty-icon {
        font-size: 40px;
        margin-bottom: 12px;
        opacity: 0.4;
      }

      .cart-empty p {
        font-size: 14px;
      }

      .cart-footer {
        padding: 20px;
        border-top: 1px solid var(--border);
      }

      .cart-total {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .cart-total-label {
        font-size: 13px;
        color: var(--muted);
      }

      .cart-total-amount {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: var(--accent);
      }

      .btn-checkout {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #060910;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }

      .btn-checkout:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(0, 245, 160, 0.35);
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }

      .modal-overlay.open {
        display: flex;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        width: 360px;
        padding: 32px;
        animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .modal-logo {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 6px;
      }

      .modal-logo span {
        color: var(--accent);
      }

      .modal p {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 28px;
      }

      .input-group {
        margin-bottom: 14px;
      }

      .input-group label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 7px;
      }

      .input-group input {
        width: 100%;
        padding: 12px 16px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .input-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0, 245, 160, 0.1);
      }

      .modal-btns {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn-cancel {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-cancel:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .btn-submit {
        flex: 2;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: #060910;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-submit:hover {
        background: #00d484;
        box-shadow: 0 4px 20px rgba(0, 245, 160, 0.3);
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%) translateY(80px);
        background: var(--surface);
        border: 1px solid var(--accent);
        color: var(--text);
        padding: 12px 20px;
        border-radius: 100px;
        font-size: 13px;
        font-weight: 500;
        z-index: 999;
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
      }
      .toast .toast-dot {
        width: 8px;
        height: 8px;
        background: var(--accent);
        border-radius: 50%;
      }

      /* ── Stats bar ── */
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .stat-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 100px;
        font-size: 12px;
        color: var(--muted);
      }

      .stat-pill strong {
        color: var(--text);
        font-family: "Syne", sans-serif;
        font-size: 13px;
      }

      .stat-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        Tech<span>Store</span>
      </div>
      <div class="header-right">
        <button class="btn-login" onclick="openLogin()">Iniciar sesión</button>
        <button class="btn-cart" onclick="toggleCart()">
          <svg
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 01-8 0" />
          </svg>
          Carrito
          <div class="cart-badge" id="cartCount">0</div>
        </button>
      </div>
    </header>

    <div class="main">
      <!-- Content -->
      <div class="content" id="content">
        <!-- Hero -->
        <div class="hero">
          <div class="hero-label">Catálogo 2025</div>
          <h2>Tecnología que<br /><em>transforma</em> tu mundo</h2>
          <p>
            Explora nuestra selección de productos premium. Calidad garantizada,
            entrega rápida.
          </p>
        </div>

        <!-- Stats -->
        <div class="stats">
          <div class="stat-pill">
            <div class="stat-dot"></div>
            <strong>5</strong> Productos
          </div>
          <div class="stat-pill">
            <div class="stat-dot" style="background: var(--accent2)"></div>
            <strong>3</strong> Categorías
          </div>
          <div class="stat-pill">
            <div class="stat-dot" style="background: var(--accent3)"></div>
            Envío <strong>gratis</strong>
          </div>
        </div>

        <!-- Filters -->
        <div class="filters">
          <button
            class="filter-btn active"
            onclick="filterProducts('all', this)"
          >
            Todos
          </button>
          <button
            class="filter-btn"
            onclick="filterProducts('celulares', this)"
          >
            📱 Celulares
          </button>
          <button
            class="filter-btn"
            onclick="filterProducts('portatiles', this)"
          >
            💻 Portátiles
          </button>
          <button
            class="filter-btn"
            onclick="filterProducts('electrodomesticos', this)"
          >
            🏠 Electrodomésticos
          </button>
        </div>

        <!-- Products -->
        <div class="products" id="products"></div>
      </div>

      <!-- Cart Drawer -->
      <div class="cart-drawer" id="cartDrawer">
        <div class="cart-header">
          <div class="cart-title">Tu carrito</div>
          <button class="btn-close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
          <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <p>Tu carrito está vacío</p>
          </div>
        </div>
        <div class="cart-footer">
          <div class="cart-total">
            <span class="cart-total-label">Total</span>
            <span class="cart-total-amount" id="cartTotal">$0</span>
          </div>
          <button class="btn-checkout" onclick="checkout()">
            Finalizar compra →
          </button>
        </div>
      </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal" onclick="closeLogin(event)">
      <div class="modal">
        <div class="modal-logo">Tech<span>Store</span></div>
        <p>Accede a tu cuenta para continuar</p>
        <div class="input-group">
          <label>Correo electrónico</label>
          <input type="email" id="email" placeholder="tu@correo.com" />
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <div class="modal-btns">
          <button class="btn-cancel" onclick="closeLogin()">Cancelar</button>
          <button class="btn-submit" onclick="login()">Ingresar →</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <div class="toast-dot"></div>
      <span id="toastMsg">Producto agregado</span>
    </div>

    <script>
      const products = [
        {
          id: 1,
          name: "Laptop HP Pavilion",
          category: "portatiles",
          price: 2500,
          img: "https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=400&q=80",
          desc: "Intel Core i7 · 16GB RAM",
        },
        {
          id: 2,
          name: "iPhone 15 Pro",
          category: "celulares",
          price: 4200,
          img: "https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=400&q=80",
          desc: "256GB · Titanio Natural",
        },
        {
          id: 3,
          name: "Nevera LG InstaView",
          category: "electrodomesticos",
          price: 3800,
          img: "https://images.unsplash.com/photo-1571175443880-49e1d25b2bc5?w=400&q=80",
          desc: "Door-in-Door · 617L",
        },
        {
          id: 4,
          name: "TV Samsung QLED",
          category: "electrodomesticos",
          price: 2800,
          img: "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=400&q=80",
          desc: '65" · 4K · 120Hz',
        },
        {
          id: 5,
          name: "MacBook Air M3",
          category: "portatiles",
          price: 5500,
          img: "https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?w=400&q=80",
          desc: "Apple M3 · 16GB · 512GB",
        },
      ];

      const catLabels = {
        celulares: "Celular",
        portatiles: "Portátil",
        electrodomesticos: "Electro",
      };
      let cart = [];
      let currentFilter = "all";
      let cartOpen = false;

      function renderProducts() {
        const container = document.getElementById("products");
        const filtered =
          currentFilter === "all"
            ? products
            : products.filter((p) => p.category === currentFilter);

        container.innerHTML = filtered
          .map(
            (p, i) => `
      <div class="card" style="animation-delay:${i * 0.07}s">
        <div class="card-img">
          <img src="${p.img}" alt="${p.name}" loading="lazy" />
          <span class="card-cat">${catLabels[p.category]}</span>
        </div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">${p.desc}</div>
          <div class="card-price">$${p.price.toLocaleString()} <span>COP</span></div>
          <button class="btn-add" onclick="addToCart(${p.id})">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Agregar al carrito
          </button>
        </div>
      </div>
    `,
          )
          .join("");
      }

      function filterProducts(cat, btn) {
        currentFilter = cat;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderProducts();
      }

      function addToCart(id) {
        const p = products.find((p) => p.id === id);
        cart.push({ ...p, uid: Date.now() });
        renderCart();
        showToast(`${p.name} agregado 🛒`);
        if (!cartOpen) toggleCart();
      }

      function removeFromCart(uid) {
        cart = cart.filter((i) => i.uid !== uid);
        renderCart();
      }

      function renderCart() {
        const el = document.getElementById("cartItems");
        const count = document.getElementById("cartCount");
        const total = document.getElementById("cartTotal");

        count.textContent = cart.length;
        total.textContent =
          "$" + cart.reduce((s, i) => s + i.price, 0).toLocaleString();

        if (!cart.length) {
          el.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Tu carrito está vacío</p></div>`;
          return;
        }

        el.innerHTML = cart
          .map(
            (item) => `
      <div class="cart-item">
        <img class="cart-item-img" src="${item.img}" alt="${item.name}" />
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">$${item.price.toLocaleString()}</div>
        </div>
        <button class="btn-remove" onclick="removeFromCart(${item.uid})">✕</button>
      </div>
    `,
          )
          .join("");
      }

      function toggleCart() {
        cartOpen = !cartOpen;
        document
          .getElementById("cartDrawer")
          .classList.toggle("open", cartOpen);
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        document.getElementById("toastMsg").textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2800);
      }

      function openLogin() {
        document.getElementById("loginModal").classList.add("open");
      }

      function closeLogin(e) {
        if (!e || e.target === document.getElementById("loginModal")) {
          document.getElementById("loginModal").classList.remove("open");
        }
      }

      function login() {
        document.getElementById("loginModal").classList.remove("open");
        showToast("¡Bienvenido de nuevo! 👋");
      }

      function checkout() {
        if (!cart.length) {
          showToast("Agrega productos primero");
          return;
        }
        showToast(`Procesando ${cart.length} producto(s)... ✓`);
      }

      renderProducts();
    </script>
  </body>
</html>
